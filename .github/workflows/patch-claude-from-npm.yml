name: Patch Claude Native (tweakcc)

on:
  workflow_dispatch:
    inputs:
      native_version:
        description: "Optional native installer version (for example: 2.1.59). Leave empty for latest."
        required: false
        default: ""
      force:
        description: "Force patch/release even if base platform release exists (uses suffix tags like vX-linux-x64-2)."
        required: false
        default: false
        type: boolean

jobs:
  patch-platform:
    name: Patch ${{ matrix.platform_label }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_label: linux-x64
            runs_on: ubuntu-latest
            release_suffix: linux-x64
            native_basename: claude.native
            needs_codesign: false
          - platform_label: linux-arm64
            runs_on: ubuntu-24.04-arm
            release_suffix: linux-arm64
            native_basename: claude.native
            needs_codesign: false
          - platform_label: macos-arm64
            runs_on: macos-26
            release_suffix: macos-arm64
            native_basename: claude.native.macos
            needs_codesign: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        id: tweakcc
        run: |
          set -euo pipefail
          npm install
          VERSION="$(node -e "console.log(require('./node_modules/tweakcc/package.json').version)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download native binary
        id: native
        run: |
          set -euo pipefail

          mkdir -p work
          INSTALL_SCRIPT="$(curl -fsSL https://claude.ai/install.sh)"
          GCS_BUCKET="$(INSTALL_SCRIPT="$INSTALL_SCRIPT" python3 -c 'import os, re; match = re.search(r"^GCS_BUCKET=\"([^\"]+)\"$", os.environ["INSTALL_SCRIPT"], re.MULTILINE); print(match.group(1) if match else (_ for _ in ()).throw(SystemExit("Could not determine GCS_BUCKET from install script")))')"

          case "${{ matrix.release_suffix }}" in
            linux-x64)
              PLATFORM="linux-x64"
              ;;
            linux-arm64)
              PLATFORM="linux-arm64"
              ;;
            macos-arm64)
              PLATFORM="darwin-arm64"
              ;;
            *)
              echo "Unsupported release suffix: ${{ matrix.release_suffix }}"
              exit 1
              ;;
          esac

          if [ -n "${{ github.event.inputs.native_version }}" ]; then
            VERSION="${{ github.event.inputs.native_version }}"
          else
            VERSION="$(curl -fsSL "$GCS_BUCKET/latest")"
          fi

          MANIFEST_PATH="work/manifest.json"
          curl -fsSL "$GCS_BUCKET/$VERSION/manifest.json" -o "$MANIFEST_PATH"

          CHECKSUM="$(python3 - "$PLATFORM" "$MANIFEST_PATH" <<'PY'
          import json
          import sys

          platform = sys.argv[1]
          manifest_path = sys.argv[2]

          with open(manifest_path, encoding="utf-8") as handle:
              manifest = json.load(handle)

          platform_data = manifest.get("platforms", {}).get(platform)
          if not platform_data:
              raise SystemExit(f"Platform {platform} not found in manifest")

          checksum = platform_data.get("checksum")
          if not checksum:
              raise SystemExit(f"Checksum missing for platform {platform}")

          print(checksum)
          PY
          )"

          NATIVE_BIN="work/claude.native.original"
          curl -fsSL "$GCS_BUCKET/$VERSION/$PLATFORM/claude" -o "$NATIVE_BIN"
          chmod +x "$NATIVE_BIN"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ACTUAL_CHECKSUM="$(shasum -a 256 "$NATIVE_BIN" | awk '{print $1}')"
          else
            ACTUAL_CHECKSUM="$(sha256sum "$NATIVE_BIN" | awk '{print $1}')"
          fi

          if [ "$ACTUAL_CHECKSUM" != "$CHECKSUM" ]; then
            echo "Checksum verification failed for $PLATFORM $VERSION"
            echo "Expected: $CHECKSUM"
            echo "Actual:   $ACTUAL_CHECKSUM"
            exit 1
          fi

          echo "path=$NATIVE_BIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if platform release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.native.outputs.version }}"
          BASE_TAG="v${VERSION}-${{ matrix.release_suffix }}"
          TAG="$BASE_TAG"
          TITLE="claude-code native ${VERSION} (${{ matrix.release_suffix }})"

          if gh release view "$BASE_TAG" > /dev/null 2>&1; then
            if [ "$FORCE_RELEASE" = "true" ]; then
              SUFFIX=2
              TAG="${BASE_TAG}-${SUFFIX}"
              while gh release view "$TAG" > /dev/null 2>&1; do
                SUFFIX=$((SUFFIX + 1))
                TAG="${BASE_TAG}-${SUFFIX}"
              done

              echo "Release ${BASE_TAG} exists; forcing with tag ${TAG}."
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "title=$TITLE (${TAG})" >> "$GITHUB_OUTPUT"
            else
              echo "Release ${BASE_TAG} already exists, skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply display patches to native binaries (tweakcc)
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail

          OUT_BASE="${{ matrix.native_basename }}"
          NEEDS_CODESIGN="${{ matrix.needs_codesign }}"

          node scripts/patch-native-with-tweakcc.ts \
            --input work/claude.native.original \
            --output "work/${OUT_BASE}.patched"
          chmod +x "work/${OUT_BASE}.patched"

          if [ "$NEEDS_CODESIGN" = "true" ]; then
            codesign -f -s - "./work/${OUT_BASE}.patched"
          fi

          "./work/${OUT_BASE}.patched" --version

      - name: Write metadata
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          {
            echo "platform=${{ matrix.release_suffix }}"
            echo "native_install_script=https://claude.ai/install.sh"
            echo "native_version=${{ steps.native.outputs.version }}"
            echo "native_binary_path=${{ steps.native.outputs.path }}"
            echo "tweakcc_version=${{ steps.tweakcc.outputs.version }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
          } > work/metadata.txt

      - name: Create platform release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.native.outputs.version }}"
          TAG="${{ steps.check.outputs.tag }}"
          TITLE="${{ steps.check.outputs.title }}"
          OUT_BASE="${{ matrix.native_basename }}"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Patched native Claude ${{ matrix.platform_label }} build via tweakcc API (version: ${{ steps.tweakcc.outputs.version }}), source version \`${VERSION}\`" \
            work/metadata.txt \
            "work/${OUT_BASE}.patched"
